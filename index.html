<!DOCTYPE html>
<head>
<title>ToDo App</title>

<link rel="stylesheet" href="style.css">
</head>
  <main>
<body>
<div class="todo-card">
  <div class="header-section">
    <header>
     <h1>My to-do list </h1>
      </header>
     <p>Stay organized by managing your daily tasks</p>
  </div>

  <div class="input-section">
    <form>
<input type="text" id="task-input" placeholder="New task">
      </form>
<button id="add-btn">Add</button>
  </div>
  <div class="search-section">
<p>task search</p>
<input type="text" id="search-input" placeholder="Enter search Text">
  </div>

  <div>
    <div class="filter-section">
      <button id="filter-all" class="filter-btn active">All</button>
      <button id="filter-active" class="filter-btn">Active</button>
      <button id="filter-completed" class="filter-btn">Completed</button>
    </div>

    <div class="tasks-section">
<h2>List of tasks</h2>
<ul id="task-list"></ul>
  </div>
<div class="stats-section">
    <h2>Statistics</h2>
    <div class="stats-grid">
    <p>Total tasks: <span id="total-count">0</span></p>
    <p>Completed: <span id="completed-count">0</span></p>
    <p>Left: <span id="remaining-count">0</span></p>
    
<script src="script.js"></script>
       </div>
    </div>
  </div>
</body>
  </main>
