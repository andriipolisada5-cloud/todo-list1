<!DOCTYPE html>
<head>
<title>ToDo App</title>

<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="todo-card">
  <div class="header-section">
     <h1>Мой список задач</h1>
     <p>Оставайтесь организованными, управляя своими ежедневными задачами</p>
  </div>

  <div class="input-section">
<input type="text" id="task-input" placeholder="новая задача">
<button id="add-btn">Добавить</button>
  </div>
  <div class="search-section">
<p>поиск задач</p>
<input type="text" id="search-input" placeholder="Введите текст для поиска">
  </div>

  <div>
    <div class="filter-section">
      <button id="filter-all" class="filter-btn active">Все</button>
      <button id="filter-active" class="filter-btn">Активные</button>
      <button id="filter-completed" class="filter-btn">Выполненные</button>
    </div>

    <div class="tasks-section">
<h2>Список задач</h2>
<ul id="task-list"></ul>
  </div>
<div class="stats-section">
    <h2>Статистика</h2>
    <div class="stats-grid">
    <p>Всего задач: <span id="total-count">0</span></p>
    <p>Выполнено: <span id="completed-count">0</span></p>
    <p>Осталось: <span id="remaining-count">0</span></p>
    
<script src="script.js"></script>
       </div>
    </div>
  </div>
</body>
</html>
